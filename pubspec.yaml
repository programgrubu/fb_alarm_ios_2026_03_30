name: fb_alarm
description: "A new Football Alarms project."
publish_to: 'none'
version: 1.0.1+13

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP istekleri için veri çekme servisleri
  http: ^1.2.0

  # Firebase servisleri - Sürümler kodla uyumlu hale getirildi
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6

  # Google Sign-In
  google_sign_in: ^6.1.6

  # Yerel Veri Saklama ve Kullanıcı Tercihleri
  shared_preferences: ^2.2.3

  # --- BİLDİRİM VE ALARM SİSTEMİ (Hataları önlemek için sürümler stabilize edildi) ---
  flutter_local_notifications: ^16.3.2
  timezone: ^0.9.2
  flutter_timezone: ^1.0.8

  # --- ARKA PLAN GÖREVLERİ ---
  workmanager: ^0.5.2

  # --- REKLAM VE ÖDEME SİSTEMLERİ ---
  google_mobile_ads: ^3.0.0
  in_app_purchase: ^3.1.11

  # API Anahtarlarını gizlemek için
  flutter_dotenv: ^5.1.0

  # İkonlar ve Tasarım Bileşenleri
  cupertino_icons: ^1.0.6
  sign_in_with_apple: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # İkon oluşturucu paket
  flutter_launcher_icons: ^0.13.1

# Uygulama ikonu ayarları
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/splash/app_icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # Asset tanımlamaları
  assets:
    - assets/splash/
    - assets/splash/app_icon.jpg
    - .env