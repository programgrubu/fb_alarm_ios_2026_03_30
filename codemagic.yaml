# Football Alarm - Codemagic Build Configuration
workflows:
  ios-workflow:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Football Alarm API 
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_STORE_APPLE_ID: 6742335191
        BUNDLE_ID: com.football.alarm 
    scripts:
      - name: Clean and Fix gitignore Encoding
        script: |
          # UTF-8 encoding hatasını çözmek için (image_301bfd.png)
          rm -f .gitignore
          printf "node_modules/\n.dart_tool/\n.packages\nbuild/\nios/Podfile.lock\n" > .gitignore
      - name: Initialize Keychain
        script: keychain initialize
      - name: Fetch Signing Files
        script: |
          # Apple tarafında sertifikaları sildiyseniz (Revoke), bu komut yeni anahtar oluşturacaktır
          app-store-connect fetch-signing-files $BUNDLE_ID --create --certificate-key
      - name: Add Certificates to Keychain
        script: keychain add-certificates
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod Install
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          # Temiz bir build başlatıyoruz
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true