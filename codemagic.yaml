workflows:
  ios-workflow:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Football Alarm API 
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_STORE_APPLE_ID: 6742335191
        BUNDLE_ID: com.football.alarm # Buraya tırnaksız şekilde Bundle ID'ni yaz
    scripts:
      - name: Initialize Keychain
        script: keychain initialize
      - name: Fetch Signing Files
        script: |
          # Hatalı olan --project-type ios kısmı kaldırıldı
          app-store-connect fetch-signing-files $BUNDLE_ID --create
      - name: Add Certificates to Keychain
        script: keychain add-certificates
      - name: Flutter pub get
        script: flutter pub get
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true