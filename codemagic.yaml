# Football Alarm - Codemagic Build Configuration
workflows:
  ios-workflow:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Football Alarm API # Paneldeki API anahtarı isminle aynı olmalı
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_signing # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD ve CM_PROVISIONING_PROFILE burada olmalı
      vars:
        APP_STORE_APPLE_ID: 6742335191
        BUNDLE_ID: "com.football.alarm"
        APPLE_TEAM_ID: "3B9P62N8T2"
    scripts:
      - name: Clean and Fix gitignore Encoding
        script: |
          rm -f .gitignore
          printf "node_modules/\n.dart_tool/\n.packages\nbuild/\nios/Podfile.lock\n" > .gitignore
      
      - name: Initialize Keychain
        script: keychain initialize
        
      - name: Set up Provisioning Profiles
        script: |
          # Provisioning profile'ı sisteme kaydeder
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $CM_PROVISIONING_PROFILE | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/football_alarm.mobileprovision
          
      - name: Set up Code Signing Certificate (p12 dosyasından)
        script: |
          # .p12 sertifikasını decode eder ve Keychain'e ekler
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
        
      - name: Flutter pub get
        script: flutter pub get
        
      - name: Pod Install
        script: |
          cd ios && pod install
          
      - name: Flutter build ipa
        script: |
          # Manuel sertifika ve profile kullanarak build işlemini başlatır
          flutter build ipa --release \
            --export-method app-store \
            --build-number $(($BUILD_NUMBER + 100))
            
    artifacts:
      - build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true