workflows:
  ios-workflow:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Football Alarm API"
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_signing
      vars:
        APP_STORE_APPLE_ID: 6742335191
        BUNDLE_ID: "com.programgrubu.football.alarm1"
        APPLE_TEAM_ID: "3B9P62N8T2"
    scripts:
      - name: Clean and Fix gitignore
        script: |
          rm -f .gitignore
          printf "node_modules/\n.dart_tool/\n.packages\nbuild/\n" > .gitignore

      - name: Initialize Keychain
        script: keychain initialize
        
      - name: Set up Provisioning Profiles
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/football_alarm.mobileprovision
          
      - name: Set up Code Signing Certificate
        script: |
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
        
      - name: Flutter pub get
        script: |
          flutter clean
          flutter pub get

      - name: Clear Pods Cache
        script: |
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData
        
      - name: Configure Flutter iOS
        script: |
          flutter precache --ios
          cd ios
          
          # HATA ÇÖZÜMÜ: podhelper içindeki yanlış yolu Codemagic yoluyla değiştiriyoruz
          sed -i '' "s|File.join('..', '..', '..', '..', 'bin', 'cache', 'artifacts', 'engine')|File.join(ENV['FLUTTER_ROOT'], 'bin', 'cache', 'artifacts', 'engine')|g" Flutter/podhelper.rb
          
          cat <<EOF > Podfile
          platform :ios, '15.0'
          
          require_relative File.expand_path(File.join('..', 'Flutter', 'podhelper.rb'), __FILE__)

          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                config.build_settings['ENABLE_BITCODE'] = 'NO'
              end
            end
          end
          EOF
        
      - name: Pod Install
        script: |
          # Flutter SDK yolunu tanımlıyoruz
          export FLUTTER_ROOT=$HOME/programs/flutter
          
          cd ios
          pod repo update
          pod install --repo-update
          
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-method app-store \
            --build-number $(($BUILD_NUMBER + 100))
            
    artifacts:
      - build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true